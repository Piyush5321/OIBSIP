<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Temp Converter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --deep: #020408;
        --nebula: #0a0e1a;
        --blue: #1a6bff;
        --cyan: #00e5ff;
        --gold: #ffc844;
        --red: #ff4d6d;
        --glow: rgba(0, 229, 255, 0.18);
        --text: #cce8ff;
      }

      body {
        background: var(--deep);
        color: var(--text);
        font-family: "Exo 2", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* ── STARFIELD ── */
      .stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .star {
        position: absolute;
        border-radius: 50%;
        background: #fff;
        animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: var(--lo, 0.2);
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.4);
        }
      }

      /* ── NEBULA BG ── */
      .nebula-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 30%,
            rgba(26, 107, 255, 0.18) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 50% at 80% 70%,
            rgba(255, 72, 109, 0.12) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 50% 70% at 55% 10%,
            rgba(0, 229, 255, 0.1) 0%,
            transparent 50%
          );
        pointer-events: none;
      }

      /* ── CARD ── */
      .card {
        position: relative;
        z-index: 10;
        width: min(92vw, 520px);
        background: rgba(10, 14, 26, 0.85);
        border: 1px solid rgba(0, 229, 255, 0.22);
        border-radius: 20px;
        padding: 48px 44px;
        box-shadow:
          0 0 0 1px rgba(0, 229, 255, 0.06),
          0 0 60px rgba(0, 229, 255, 0.1),
          0 20px 80px rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(18px);
        animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(40px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* corner accents */
      .card::before,
      .card::after {
        content: "";
        position: absolute;
        width: 24px;
        height: 24px;
        border-color: var(--cyan);
        border-style: solid;
        opacity: 0.55;
      }
      .card::before {
        top: 14px;
        left: 14px;
        border-width: 2px 0 0 2px;
        border-radius: 4px 0 0 0;
      }
      .card::after {
        bottom: 14px;
        right: 14px;
        border-width: 0 2px 2px 0;
        border-radius: 0 0 4px 4px;
      }

      /* ── HEADER ── */
      .badge {
        display: inline-block;
        font-family: "Orbitron", monospace;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        font-weight: 700;
        color: var(--nebula);
        background: var(--cyan);
        padding: 3px 10px;
        border-radius: 3px;
        margin-bottom: 12px;
        text-transform: uppercase;
      }
      h1 {
        font-family: "Orbitron", monospace;
        font-size: clamp(1.5rem, 5vw, 2.1rem);
        font-weight: 900;
        letter-spacing: 0.06em;
        line-height: 1.1;
        background: linear-gradient(135deg, #fff 30%, var(--cyan) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 6px;
      }
      .subtitle {
        font-size: 0.8rem;
        color: rgba(204, 232, 255, 0.45);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 36px;
      }

      /* ── DIVIDER ── */
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--cyan),
          transparent
        );
        margin: 0 -8px 32px;
        opacity: 0.3;
      }

      /* ── LABELS ── */
      label {
        display: block;
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(0, 229, 255, 0.7);
        margin-bottom: 8px;
        font-family: "Orbitron", monospace;
        font-weight: 400;
      }

      /* ── INPUT ── */
      .input-wrap {
        position: relative;
        margin-bottom: 22px;
      }
      input[type="number"] {
        width: 100%;
        background: rgba(0, 229, 255, 0.05);
        border: 1px solid rgba(0, 229, 255, 0.25);
        border-radius: 10px;
        color: #fff;
        font-family: "Orbitron", monospace;
        font-size: 1.5rem;
        font-weight: 700;
        padding: 16px 52px 16px 20px;
        outline: none;
        transition:
          border-color 0.25s,
          box-shadow 0.25s,
          background 0.25s;
        appearance: textfield;
        -moz-appearance: textfield;
      }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }
      input[type="number"]:focus {
        border-color: var(--cyan);
        background: rgba(0, 229, 255, 0.1);
        box-shadow:
          0 0 22px rgba(0, 229, 255, 0.18),
          inset 0 0 10px rgba(0, 229, 255, 0.05);
      }
      input[type="number"].error {
        border-color: var(--red);
        box-shadow: 0 0 18px rgba(255, 77, 109, 0.25);
      }
      .unit-hint {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        font-family: "Orbitron", monospace;
        font-size: 0.85rem;
        color: rgba(0, 229, 255, 0.5);
        pointer-events: none;
        transition: color 0.25s;
      }
      .error-msg {
        font-size: 0.7rem;
        color: var(--red);
        letter-spacing: 0.1em;
        margin-top: 6px;
        height: 16px;
        font-family: "Exo 2", sans-serif;
        transition: opacity 0.2s;
      }

      /* ── RADIO TOGGLE ── */
      .toggle-group {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-bottom: 28px;
      }
      .toggle-group input[type="radio"] {
        display: none;
      }
      .toggle-group label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        background: rgba(0, 229, 255, 0.05);
        border: 1px solid rgba(0, 229, 255, 0.2);
        border-radius: 8px;
        padding: 12px 8px;
        cursor: pointer;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        color: rgba(204, 232, 255, 0.6);
        transition: all 0.2s;
        user-select: none;
        margin: 0;
        text-transform: uppercase;
      }
      .toggle-group label .icon {
        font-size: 1rem;
      }
      .toggle-group input[type="radio"]:checked + label {
        background: rgba(0, 229, 255, 0.15);
        border-color: var(--cyan);
        color: var(--cyan);
        box-shadow:
          0 0 14px rgba(0, 229, 255, 0.2),
          inset 0 0 8px rgba(0, 229, 255, 0.07);
      }
      .toggle-group label:hover {
        border-color: rgba(0, 229, 255, 0.5);
        color: var(--text);
        background: rgba(0, 229, 255, 0.08);
      }

      /* ── BUTTON ── */
      .btn {
        width: 100%;
        background: linear-gradient(
          135deg,
          rgba(0, 229, 255, 0.15) 0%,
          rgba(26, 107, 255, 0.25) 100%
        );
        border: 1px solid var(--cyan);
        border-radius: 10px;
        color: var(--cyan);
        font-family: "Orbitron", monospace;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        padding: 16px;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.25s;
        position: relative;
        overflow: hidden;
        margin-bottom: 28px;
      }
      .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(0, 229, 255, 0.3),
          rgba(26, 107, 255, 0.4)
        );
        opacity: 0;
        transition: opacity 0.25s;
      }
      .btn:hover {
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.35);
        color: #fff;
      }
      .btn:hover::before {
        opacity: 1;
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn span {
        position: relative;
        z-index: 1;
      }

      /* ── RESULT ── */
      .result-box {
        background: rgba(0, 229, 255, 0.04);
        border: 1px solid rgba(0, 229, 255, 0.15);
        border-radius: 12px;
        padding: 22px 24px;
        text-align: center;
        min-height: 96px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
      }
      .result-box.show {
        border-color: rgba(0, 229, 255, 0.4);
        background: rgba(0, 229, 255, 0.08);
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.12);
      }
      .result-label {
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(0, 229, 255, 0.5);
        margin-bottom: 6px;
        font-family: "Orbitron", monospace;
      }
      .result-value {
        font-family: "Orbitron", monospace;
        font-size: clamp(1.8rem, 7vw, 2.8rem);
        font-weight: 900;
        background: linear-gradient(135deg, var(--gold), var(--cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.6);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .result-unit {
        font-size: 0.85rem;
        color: rgba(204, 232, 255, 0.5);
        margin-top: 4px;
        letter-spacing: 0.1em;
      }
      .result-placeholder {
        font-size: 0.8rem;
        color: rgba(204, 232, 255, 0.2);
        letter-spacing: 0.1em;
        font-style: italic;
      }

      /* pulse ring on result */
      .result-box.show::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 12px;
        border: 1px solid var(--cyan);
        animation: pulse-ring 2s ease-out infinite;
        pointer-events: none;
      }
      @keyframes pulse-ring {
        0% {
          opacity: 0.6;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.04);
        }
      }

      /* ── ORBIT DECORATION ── */
      .orbit {
        position: fixed;
        border-radius: 50%;
        border: 1px solid rgba(0, 229, 255, 0.07);
        pointer-events: none;
        z-index: 0;
        animation: spin linear infinite;
      }
      .orbit:nth-child(1) {
        width: 600px;
        height: 600px;
        top: -200px;
        right: -200px;
        animation-duration: 40s;
      }
      .orbit:nth-child(2) {
        width: 380px;
        height: 380px;
        bottom: -100px;
        left: -150px;
        animation-duration: 28s;
        animation-direction: reverse;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ── FOOTER ── */
      .footer {
        text-align: center;
        margin-top: 28px;
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(204, 232, 255, 0.18);
      }
    </style>
  </head>
  <body>
    <div class="nebula-bg"></div>
    <div class="stars" id="stars"></div>
    <div class="orbit"></div>
    <div class="orbit"></div>

    <div class="card">
      <div class="badge">Level 1 · Task 3</div>
      <h1>Temperature<br />Converter</h1>
      <p class="subtitle">Interstellar Unit Translator</p>
      <div class="divider"></div>

      <label for="tempInput">Enter Temperature</label>
      <div class="input-wrap">
        <input type="number" id="tempInput" placeholder="0" step="any" />
        <span class="unit-hint" id="unitHint">°C</span>
      </div>
      <p class="error-msg" id="errorMsg"></p>

      <label style="margin-bottom: 10px">From Unit</label>
      <div class="toggle-group">
        <input type="radio" name="unit" id="uC" value="C" checked />
        <label for="uC"><span class="icon">🌡</span> Celsius</label>

        <input type="radio" name="unit" id="uF" value="F" />
        <label for="uF"><span class="icon">🔥</span> Fahrenheit</label>

        <input type="radio" name="unit" id="uK" value="K" />
        <label for="uK"><span class="icon">🌌</span> Kelvin</label>
      </div>

      <button class="btn" id="convertBtn"><span>⚡ Convert</span></button>

      <div class="result-box" id="resultBox">
        <p class="result-placeholder" id="placeholder">
          Awaiting transmission…
        </p>
        <div
          id="resultContent"
          style="display: none; text-align: center; width: 100%"
        >
          <p class="result-label">Converted Result</p>
          <p class="result-value" id="resultValue"></p>
          <p class="result-unit" id="resultUnit"></p>
        </div>
      </div>

      <p class="footer">🚀 Powered by galactic math · All scales supported</p>
    </div>

    <script>
      // ── STARS ──
      const starsEl = document.getElementById("stars");
      for (let i = 0; i < 160; i++) {
        const s = document.createElement("div");
        s.className = "star";
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random() * 100}%; left:${Math.random() * 100}%;
      --d:${(Math.random() * 4 + 2).toFixed(1)}s;
      --delay:-${(Math.random() * 5).toFixed(1)}s;
      --lo:${(Math.random() * 0.3 + 0.05).toFixed(2)};
    `;
        starsEl.appendChild(s);
      }

      // ── LOGIC ──
      const input = document.getElementById("tempInput");
      const errorMsg = document.getElementById("errorMsg");
      const unitHint = document.getElementById("unitHint");
      const resultBox = document.getElementById("resultBox");
      const placeholder = document.getElementById("placeholder");
      const resultContent = document.getElementById("resultContent");
      const resultValue = document.getElementById("resultValue");
      const resultUnit = document.getElementById("resultUnit");

      // update hint symbol when unit changes
      document.querySelectorAll('input[name="unit"]').forEach((r) =>
        r.addEventListener("change", () => {
          const map = { C: "°C", F: "°F", K: "K" };
          unitHint.textContent = map[r.value];
        }),
      );

      function getUnit() {
        return document.querySelector('input[name="unit"]:checked').value;
      }

      function convert(val, from) {
        const results = {};
        if (from === "C") {
          results.F = `${((val * 9) / 5 + 32).toFixed(2)} °F`;
          results.K = `${(val + 273.15).toFixed(2)} K`;
        } else if (from === "F") {
          results.C = `${(((val - 32) * 5) / 9).toFixed(2)} °C`;
          results.K = `${(((val - 32) * 5) / 9 + 273.15).toFixed(2)} K`;
        } else {
          results.C = `${(val - 273.15).toFixed(2)} °C`;
          results.F = `${(((val - 273.15) * 9) / 5 + 32).toFixed(2)} °F`;
        }
        return results;
      }

      function unitFullName(key) {
        return { C: "Celsius", F: "Fahrenheit", K: "Kelvin" }[key];
      }

      document.getElementById("convertBtn").addEventListener("click", () => {
        const raw = input.value.trim();
        errorMsg.textContent = "";
        input.classList.remove("error");

        if (raw === "" || isNaN(Number(raw))) {
          errorMsg.textContent = "⚠ Please enter a valid number";
          input.classList.add("error");
          return;
        }

        const val = parseFloat(raw);
        const from = getUnit();

        // Physical validation for Kelvin
        if (from === "K" && val < 0) {
          errorMsg.textContent =
            "⚠ Kelvin cannot be negative (absolute zero = 0 K)";
          input.classList.add("error");
          return;
        }
        if (from === "C" && val < -273.15) {
          errorMsg.textContent = "⚠ Below absolute zero (−273.15 °C)";
          input.classList.add("error");
          return;
        }
        if (from === "F" && val < -459.67) {
          errorMsg.textContent = "⚠ Below absolute zero (−459.67 °F)";
          input.classList.add("error");
          return;
        }

        const res = convert(val, from);
        const entries = Object.entries(res);

        // Build multi-line output
        const lines = entries.map(([k, v]) => v).join("  ·  ");
        const units = entries.map(([k]) => unitFullName(k)).join(" · ");

        // Re-trigger animation
        resultValue.style.animation = "none";
        requestAnimationFrame(() => {
          resultValue.style.animation = "";
          resultValue.textContent = lines;
          resultUnit.textContent = `→ ${units}`;
          placeholder.style.display = "none";
          resultContent.style.display = "block";
          resultBox.classList.add("show");
        });
      });

      // Allow Enter key
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("convertBtn").click();
      });
    </script>
  </body>
</html>
